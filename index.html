<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WireNerd — Industrial Electrical, Made Clear</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a1a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 600px;
    }
    .logo {
      font-size: 64px;
      font-weight: 700;
      letter-spacing: -2px;
      margin-bottom: 12px;
    }
    .tagline {
      font-size: 14px;
      letter-spacing: 4px;
      color: #B4B2A9;
      margin-bottom: 48px;
      text-transform: uppercase;
    }
    .headline {
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 16px;
      line-height: 1.3;
    }
    .subhead {
      font-size: 16px;
      color: #B4B2A9;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .signup {
      display: flex;
      gap: 8px;
      max-width: 400px;
      margin: 0 auto;
    }
    input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #2a2a2a;
      color: #fff;
      font-size: 15px;
    }
    button {
      padding: 12px 24px;
      background: #EF9F27;
      color: #1a1a1a;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #FAC775;
    }
    .footer {
      margin-top: 48px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">wirenerd</div>
    <div class="tagline">Industrial Electrical · Made Clear</div>
    <div class="headline">Practical training for working electricians.</div>
    <div class="subhead">Real-world videos and courses on industrial wiring, motor controls, PLCs, and troubleshooting. Coming soon.</div>
    <form class="signup" onsubmit="event.preventDefault(); alert('Thanks! We will be in touch.');">
      <input type="email" placeholder="your@email.com" required>
      <button type="submit">Notify me</button>
    </form>
    <div class="footer">© 2026 WireNerd</div>
  </div>
</body>
</html>
